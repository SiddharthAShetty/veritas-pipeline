<svg viewBox="0 0 1400 980" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A5A7A"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#C0526B"/>
    </marker>
  </defs>
  <rect width="1400" height="980" fill="#0B1220"/>
  <text x="30" y="38" fill="#E4E9F4" font-size="22" font-weight="700">Veritas Claims — Medical Data Standardisation Pipeline</text>
  <text x="30" y="60" fill="#8C9BC0" font-size="13">GCS-triggered, config-driven ETL. Solid arrows = happy path. Red arrows = failure path.</text>

  <!-- Clinics -->
  <g>
    <rect x="30" y="90" width="180" height="70" rx="10" fill="#17233B" stroke="#253352"/>
    <text x="120" y="118" fill="#E4E9F4" font-size="13" text-anchor="middle" font-weight="600">500+ Clinics / Labs</text>
    <text x="120" y="138" fill="#8C9BC0" font-size="11" text-anchor="middle">JSON per report,</text>
    <text x="120" y="152" fill="#8C9BC0" font-size="11" text-anchor="middle">own field conventions</text>
  </g>

  <!-- GCS raw -->
  <g>
    <rect x="280" y="90" width="200" height="70" rx="10" fill="#121B2E" stroke="#4FD1C5" stroke-width="1.5"/>
    <text x="380" y="114" fill="#4FD1C5" font-size="13" text-anchor="middle" font-weight="600">GCS: raw-reports/</text>
    <text x="380" y="134" fill="#8C9BC0" font-size="11" text-anchor="middle">{clinic_id}/{date}/{file}.json</text>
    <text x="380" y="148" fill="#8C9BC0" font-size="11" text-anchor="middle">one bucket, versioned</text>
  </g>
  <line x1="210" y1="125" x2="278" y2="125" stroke="#4A5A7A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Eventarc/PubSub -->
  <g>
    <rect x="560" y="90" width="190" height="70" rx="10" fill="#17233B" stroke="#253352"/>
    <text x="655" y="114" fill="#E4E9F4" font-size="13" text-anchor="middle" font-weight="600">Eventarc / Pub-Sub</text>
    <text x="655" y="134" fill="#8C9BC0" font-size="11" text-anchor="middle">object-finalize trigger</text>
    <text x="655" y="148" fill="#8C9BC0" font-size="11" text-anchor="middle">per-file event, at-least-once</text>
  </g>
  <line x1="480" y1="125" x2="558" y2="125" stroke="#4A5A7A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cloud Run Workers -->
  <g>
    <rect x="820" y="80" width="220" height="90" rx="10" fill="#121B2E" stroke="#4FD1C5" stroke-width="1.5"/>
    <text x="930" y="104" fill="#4FD1C5" font-size="13" text-anchor="middle" font-weight="600">Cloud Run workers</text>
    <text x="930" y="122" fill="#8C9BC0" font-size="11" text-anchor="middle">Ingestion → Standardisation</text>
    <text x="930" y="136" fill="#8C9BC0" font-size="11" text-anchor="middle">→ Validation (this repo's</text>
    <text x="930" y="150" fill="#8C9BC0" font-size="11" text-anchor="middle">src/ modules, containerised)</text>
    <text x="930" y="163" fill="#5A688C" font-size="10" text-anchor="middle">autoscales 0→N on queue depth</text>
  </g>
  <line x1="750" y1="125" x2="818" y2="125" stroke="#4A5A7A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Config layer below workers -->
  <g>
    <rect x="820" y="220" width="220" height="110" rx="10" fill="#17233B" stroke="#F5B94D" stroke-width="1.3"/>
    <text x="930" y="244" fill="#F5B94D" font-size="13" text-anchor="middle" font-weight="600">Config layer</text>
    <text x="930" y="264" fill="#8C9BC0" font-size="11" text-anchor="middle">GCS config/ bucket, versioned</text>
    <text x="930" y="280" fill="#8C9BC0" font-size="11" text-anchor="middle">clinics/*.json · test_dictionary</text>
    <text x="930" y="296" fill="#8C9BC0" font-size="11" text-anchor="middle">reference_ranges · unit_conv</text>
    <text x="930" y="312" fill="#8C9BC0" font-size="11" text-anchor="middle">medicine_mapping · hot-reloaded</text>
  </g>
  <line x1="930" y1="220" x2="930" y2="172" stroke="#F5B94D" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="948" y="200" fill="#F5B94D" font-size="10">reads config,</text>
  <text x="948" y="212" fill="#F5B94D" font-size="10">no redeploy</text>

  <!-- BigQuery -->
  <g>
    <rect x="1110" y="80" width="220" height="90" rx="10" fill="#121B2E" stroke="#4FD1C5" stroke-width="1.5"/>
    <text x="1220" y="104" fill="#4FD1C5" font-size="13" text-anchor="middle" font-weight="600">BigQuery</text>
    <text x="1220" y="122" fill="#8C9BC0" font-size="11" text-anchor="middle">clinical_records (canonical,</text>
    <text x="1220" y="136" fill="#8C9BC0" font-size="11" text-anchor="middle">partitioned by ingest date,</text>
    <text x="1220" y="150" fill="#8C9BC0" font-size="11" text-anchor="middle">clustered by clinic_id)</text>
    <text x="1220" y="163" fill="#5A688C" font-size="10" text-anchor="middle">MERGE upsert on deterministic id</text>
  </g>
  <line x1="1040" y1="125" x2="1108" y2="125" stroke="#4A5A7A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Audit trail -->
  <g>
    <rect x="1110" y="220" width="220" height="70" rx="10" fill="#17233B" stroke="#253352"/>
    <text x="1220" y="244" fill="#E4E9F4" font-size="13" text-anchor="middle" font-weight="600">GCS: audit-trail/</text>
    <text x="1220" y="264" fill="#8C9BC0" font-size="11" text-anchor="middle">raw JSON + transformed rows,</text>
    <text x="1220" y="278" fill="#8C9BC0" font-size="11" text-anchor="middle">keyed by document_id</text>
  </g>
  <line x1="1220" y1="170" x2="1220" y2="218" stroke="#4A5A7A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dead letter path (red) -->
  <g>
    <rect x="820" y="400" width="220" height="90" rx="10" fill="#1C1420" stroke="#C0526B" stroke-width="1.5"/>
    <text x="930" y="424" fill="#FF9B9B" font-size="13" text-anchor="middle" font-weight="600">Dead-letter topic</text>
    <text x="930" y="444" fill="#C7A3AE" font-size="11" text-anchor="middle">malformed JSON, unknown</text>
    <text x="930" y="458" fill="#C7A3AE" font-size="11" text-anchor="middle">clinic, unresolved test names</text>
    <text x="930" y="472" fill="#C7A3AE" font-size="11" text-anchor="middle">→ GCS dead-letter/ + BQ table</text>
  </g>
  <line x1="930" y1="170" x2="930" y2="398" stroke="#C0526B" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowRed)"/>
  <text x="960" y="300" fill="#C0526B" font-size="10">on failure</text>

  <g>
    <rect x="1110" y="400" width="220" height="90" rx="10" fill="#17233B" stroke="#F5B94D" stroke-width="1.3"/>
    <text x="1220" y="424" fill="#F5B94D" font-size="13" text-anchor="middle" font-weight="600">Cloud Monitoring</text>
    <text x="1220" y="444" fill="#8C9BC0" font-size="11" text-anchor="middle">error-rate, lag, throughput</text>
    <text x="1220" y="458" fill="#8C9BC0" font-size="11" text-anchor="middle">metrics; alert &gt;1% err or</text>
    <text x="1220" y="472" fill="#8C9BC0" font-size="11" text-anchor="middle">&gt;15 min p95 lag → PagerDuty</text>
  </g>
  <line x1="1040" y1="445" x2="1108" y2="445" stroke="#F5B94D" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- UI layer -->
  <g>
    <rect x="560" y="580" width="380" height="110" rx="10" fill="#121B2E" stroke="#4FD1C5" stroke-width="1.5"/>
    <text x="750" y="606" fill="#4FD1C5" font-size="13" text-anchor="middle" font-weight="600">Operational UI — Cloud Run (Flask)</text>
    <text x="750" y="628" fill="#8C9BC0" font-size="11" text-anchor="middle">Dashboard · Flagged Queue · Clinic Summary</text>
    <text x="750" y="644" fill="#8C9BC0" font-size="11" text-anchor="middle">Record Inspector (raw JSON + standardised)</text>
    <text x="750" y="660" fill="#8C9BC0" font-size="11" text-anchor="middle">reads BigQuery views, read-only, IAP-gated</text>
    <text x="750" y="676" fill="#5A688C" font-size="10" text-anchor="middle">this repo's ui/app.py — same code, swap SQLite→BQ client</text>
  </g>
  <line x1="1220" y1="170" x2="1220" y2="580" stroke="#4A5A7A" stroke-width="1.5" stroke-dasharray="2,3"/>
  <line x1="1220" y1="580" x2="940" y2="580" stroke="#4A5A7A" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
  <text x="1230" y="530" fill="#5A688C" font-size="10">reads (not shown: BQ views)</text>

  <g>
    <rect x="30" y="580" width="180" height="70" rx="10" fill="#17233B" stroke="#253352"/>
    <text x="120" y="608" fill="#E4E9F4" font-size="13" text-anchor="middle" font-weight="600">Ops / Claims</text>
    <text x="120" y="608" dy="18" fill="#8C9BC0" font-size="11" text-anchor="middle">Analysts</text>
  </g>
  <line x1="210" y1="615" x2="558" y2="635" stroke="#4A5A7A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Bottom: NFR annotations -->
  <g>
    <rect x="30" y="740" width="1340" height="210" rx="10" fill="#121B2E" stroke="#253352"/>
    <text x="50" y="768" fill="#E4E9F4" font-size="14" font-weight="700">Non-functional design notes</text>

    <text x="50" y="796" fill="#4FD1C5" font-size="12" font-weight="600">Scale (NFR-1)</text>
    <text x="50" y="814" fill="#8C9BC0" font-size="11">200k/day ≈ 2.3 files/sec avg,</text>
    <text x="50" y="830" fill="#8C9BC0" font-size="11">~5/sec at 2x burst. Cloud Run</text>
    <text x="50" y="846" fill="#8C9BC0" font-size="11">concurrency + autoscale absorbs</text>
    <text x="50" y="862" fill="#8C9BC0" font-size="11">this without pre-provisioning.</text>
    <text x="50" y="878" fill="#8C9BC0" font-size="11">Per-file processing keeps p95</text>
    <text x="50" y="894" fill="#8C9BC0" font-size="11">latency independent of batch size.</text>

    <text x="330" y="796" fill="#4FD1C5" font-size="12" font-weight="600">Onboarding (NFR-2)</text>
    <text x="330" y="814" fill="#8C9BC0" font-size="11">New clinic = 1 config file</text>
    <text x="330" y="830" fill="#8C9BC0" font-size="11">(config/clinics/{id}.json) declaring</text>
    <text x="330" y="846" fill="#8C9BC0" font-size="11">field paths + date format. No</text>
    <text x="330" y="862" fill="#8C9BC0" font-size="11">redeploy. Schema versioning via</text>
    <text x="330" y="878" fill="#8C9BC0" font-size="11">config filename suffix</text>
    <text x="330" y="894" fill="#8C9BC0" font-size="11">(e.g. apollo_diagnostics_v2.json).</text>

    <text x="630" y="796" fill="#4FD1C5" font-size="12" font-weight="600">Reliability (NFR-3)</text>
    <text x="630" y="814" fill="#8C9BC0" font-size="11">Per-file isolation: one bad file</text>
    <text x="630" y="830" fill="#8C9BC0" font-size="11">→ dead-letter, doesn't block the</text>
    <text x="630" y="846" fill="#8C9BC0" font-size="11">queue. Idempotent MERGE keyed on</text>
    <text x="630" y="862" fill="#8C9BC0" font-size="11">a deterministic id (doc_id + type +</text>
    <text x="630" y="878" fill="#8C9BC0" font-size="11">test_name + page) makes re-runs</text>
    <text x="630" y="894" fill="#8C9BC0" font-size="11">safe — this repo's SQLite loader.</text>

    <text x="930" y="796" fill="#4FD1C5" font-size="12" font-weight="600">Data quality (NFR-4)</text>
    <text x="930" y="814" fill="#8C9BC0" font-size="11">Unresolved test names logged, not</text>
    <text x="930" y="830" fill="#8C9BC0" font-size="11">dropped → dictionary-curation queue,</text>
    <text x="930" y="846" fill="#8C9BC0" font-size="11">tracked against the 98%-in-30-days</text>
    <text x="930" y="862" fill="#8C9BC0" font-size="11">target. document_id/clinic_id/</text>
    <text x="930" y="878" fill="#8C9BC0" font-size="11">ingested_at on every row = lineage.</text>
    <text x="930" y="894" fill="#8C9BC0" font-size="11">PII masking: see Assumptions.</text>

    <text x="1150" y="796" fill="#4FD1C5" font-size="12" font-weight="600">Observability (NFR-5)</text>
    <text x="1150" y="814" fill="#8C9BC0" font-size="11">Structured logs carry trace_id/</text>
    <text x="1150" y="830" fill="#8C9BC0" font-size="11">correlation_id end-to-end (see</text>
    <text x="1150" y="846" fill="#8C9BC0" font-size="11">src/*.py logging calls). pipeline_runs</text>
    <text x="1150" y="862" fill="#8C9BC0" font-size="11">+ clinic_quality_stats tables feed</text>
    <text x="1150" y="878" fill="#8C9BC0" font-size="11">the dashboard directly.</text>
  </g>
</svg>
